name: 🔁 Auto URL Submit Every 3 Hours

on:
  schedule:
    - cron: '30 */2 * * *'  # IST: 6:30AM, 9:30AM...
  workflow_dispatch:  # Manual trigger

permissions:                    # ✅ IMPORTANT: Push permission
  contents: write              # Allow writing to repo
  actions: read                # Allow reading workflow logs

jobs:
  auto-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Kolkata
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}  # Explicit token

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Chrome & Chromedriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: 🤖 Run Auto Submit Script
        env:
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
        run: python auto_submit.py

      - name: 💾 Save Progress to Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f "submitted_urls.json" ]; then
            git add submitted_urls.json
          fi
          if [ -f "automation.log" ]; then
            git add automation.log
          fi
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "📝 Auto-update: $(date '+%Y-%m-%d %H:%M IST')"
            git push
          else
            echo "✅ No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload Logs (for download)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs-${{ github.run_number }}
          path: |
            automation.log
            submitted_urls.json
          retention-days: 7
